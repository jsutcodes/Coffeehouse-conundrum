<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffeehouse Scheduler</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4 text-center">Menu Records from API</h2>
        <div class="table-responsive">
            <table class="table table-striped table-hover shadow-sm rounded" id="userTable">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Website</th>
                    </tr>
                </thead>
                <tbody id="data-output">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- JavaScript Below -->
	<script>
	    async function fetchData() {
	        try {
	            // 1. Call the API
	            const response = await fetch('http://localhost:8080/api/menu');
	            const data = await response.json();
	            
	            // 2. Select the table body
	            const tableBody = document.getElementById('data-output');
	            
	            // 3. Loop through data and create rows
	            let output = "";
	            data.forEach(user => {
	                output += `
	                    <tr>
	                        <td>${user.id}</td>
	                        <td>${user.name}</td>
	                        <td>${user.email}</td>
	                        <td>${user.website}</td>
	                    </tr>
	                `;
	            });
	            
	            // 4. Inject into the table
	            tableBody.innerHTML = output;
	        } catch (error) {
	            console.error("Error fetching data:", error);
	        }
	    }

	    // Call function on page load
	    fetchData();
	</script>

</body>
</html>
