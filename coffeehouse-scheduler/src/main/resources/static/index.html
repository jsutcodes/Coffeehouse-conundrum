<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffeehouse Scheduler</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.3/css/bootstrap.min.css">
    <style>
        .shadow-inner { box-shadow: inset 0 2px 4px rgba(0,0,0,0.06); }
        .table-responsive { max-height: 70vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-light">
    <div class="container-fluid py-5 px-4">
        <!-- TOP SECTION: Order and Menu -->
        <div class="row g-4 d-flex align-items-stretch">
            
            <!-- LEFT COLUMN: People List -->
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">Orders</h4>
                        <span class="badge bg-white text-primary" id="person-count">0 People</span>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Name</th>
                                        <th>Total Cost</th>
                                        <th style="width: 150px;"></th>
                                    </tr>
                                </thead>
                                <tbody id="data-output-person" class="small">
                                    <!-- Data injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer d-flex gap-2 bg-white border-top-0 pb-3">
						<button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#addPersonModal">Add Person</button>
                        <button class="btn btn-sm btn-success ms-auto" onclick="fetchSchedule()">Calculate Pay Schedule</button>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: Menu -->
            <div class="col-lg-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-dark text-white text-center">
                        <h5 class="mb-0">Menu</h5>
                    </div>
                    <div class="card-body px-0 d-flex flex-column">
                        <div class="table-responsive">
                            <table class="table table-sm table-striped mb-0">
                                <thead class="small text-muted">
                                    <tr>
                                        <th class="ps-3">Item</th>
                                        <th>Size</th>
                                        <th class="pe-3">Price</th>
                                    </tr>
                                </thead>
                                <tbody id="data-output-menu" class="small">
                                    <!-- Data injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer d-flex justify-content-center gap-2 bg-white border-top-0 pb-3 mt-auto">
						<button class="btn btn-sm btn-outline-dark px-3" data-bs-toggle="modal" data-bs-target="#addMenuItemModal">Add Item</button>

                    </div>
                </div>
            </div>
        </div> <!-- End Top Row -->

        <!-- BOTTOM SECTION: Pay Schedule -->
        <div class="row g-4 mt-2">
            <div class="col-12" id="schedule-container" style="display: none;">
				<div id="alert-placeholder"></div>
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Pay Schedule</h5>
                        <button type="button" class="btn-close btn-close-white" onclick="document.getElementById('schedule-container').style.display='none'"></button>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-sm table-bordered align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Round</th>
                                        <th>Payer</th>
                                        <th>Balances</th>
                                    </tr>
                                </thead>
                                <tbody id="data-output-schedule">
                                    <!-- Schedule data injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div> <!-- End Container -->
	
	<!-- Add Person Modal -->
	<div class="modal fade" id="addPersonModal" tabindex="-1" aria-hidden="true">
	    <div class="modal-dialog">
	        <div class="modal-content">
	            <div class="modal-header">
	                <h5 class="modal-title">Add New Person</h5>
	                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
	            </div>
	            <div class="modal-body">
	                <div class="mb-3">
	                    <label for="personNameInput" class="form-label">Name</label>
	                    <input type="text" class="form-control" id="personNameInput" placeholder="Enter name">
	                </div>
	            </div>
	            <div class="modal-footer">
	                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
	                <button type="button" class="btn btn-primary" onclick="submitPerson()">Save Person</button>
	            </div>
	        </div>
	    </div>
	</div>
	
	<!-- Add Menu Item Modal -->
	<div class="modal fade" id="addMenuItemModal" tabindex="-1" aria-hidden="true">
	    <div class="modal-dialog">
	        <div class="modal-content">
	            <div class="modal-header bg-dark text-white">
	                <h5 class="modal-title">Add New Menu Item</h5>
	                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
	            </div>
	            <div class="modal-body">
	                <div class="mb-3">
	                    <label class="form-label">Item Name</label>
	                    <input type="text" class="form-control" id="menuItemName" placeholder="e.g. Latte">
	                </div>
	                <div class="mb-3">
	                    <label class="form-label">Size</label>
	                    <select class="form-select" id="menuItemSize">
	                        <option value="small">Small</option>
	                        <option value="medium">Medium</option>
	                        <option value="large">Large</option>
	                    </select>
	                </div>
	                <div class="mb-3">
	                    <label class="form-label">Price ($)</label>
						<input type="number" step="0.01" min="0" class="form-control" id="menuItemPrice" placeholder="0.00">
	                </div>
	            </div>
	            <div class="modal-footer">
	                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
	                <button type="button" class="btn btn-dark" onclick="submitMenuItem()">Add to Menu</button>
	            </div>
	        </div>
	    </div>
	</div>
    <!-- JavaScript -->
    <script>
        async function fetchData() {
			
			var menuData = null;
            // 1. Fetch Menu
            try {
                const response = await fetch('http://localhost:8080/api/menu');
                menuData = await response.json();
                const menuBody = document.getElementById('data-output-menu');
                
                menuBody.innerHTML = menuData.map(item => `
                    <tr>
                        <td class="ps-3 fw-bold">${item.name}</td>
                        <td><span class="text-muted text-capitalize">${item.size}</span></td>
                        <td class="pe-3 text-success font-monospace">$${item.price.toFixed(2)}</td>
                    </tr>
                `).join('');
            } catch (error) {
                document.getElementById('data-output-menu').innerHTML = `<tr><td colspan="3" class="text-center py-3 text-danger">Menu Offline</td></tr>`;
            }

			// 2. Fetch People
			try {
			    const response = await fetch('http://localhost:8080/api/person');
			    const personData = await response.json();
			    const personBody = document.getElementById('data-output-person');
			    document.getElementById('person-count').innerText = `${personData.length} People`;
			    
			    let output = "";
			    let grandTotal = 0; // Initialize grand total

			    personData.forEach(person => {
			        const totalCost = person.items.reduce((acc, item) => acc + item.price, 0);
			        grandTotal += totalCost; // Add person's total to grand total
			        
			        const itemRows = person.items.map(item => `
			            <tr>
			                <td>${item.name}</td>
			                <td>${item.size}</td>
			                <td class="text-success">$${item.price.toFixed(2)}</td>
			                <td class="text-center">
			                    <button class="btn btn-outline-danger btn-sm px-2 py-0" onclick="removeItem(${person.id}, ${item.id})">&minus;</button>
			                </td>
			            </tr>
			        `).join('');

			        const menuOptions = menuData.map(m => `<option value="${m.id}">${m.name} (${m.size}) - $${m.price.toFixed(2)}</option>`).join('');
			        output += `
			            <tr class="align-middle">
			                <td class="ps-3 fw-bold">${person.name}</td>
			                <td class="text-success font-monospace">$${totalCost.toFixed(2)}</td>
			                <td class="text-end pe-3">
			                    <button class="btn btn-outline-primary btn-sm" type="button" data-bs-toggle="collapse" data-bs-target="#items-${person.id}">
			                        Items (${person.items.length})
			                    </button>
			                    <button class="btn btn-outline-danger btn-sm" onclick="removePerson(${person.id})">&times;</button>
			                </td>
			            </tr>
			            <tr>
			                <td colspan="3" class="p-0">
			                    <div class="collapse bg-white" id="items-${person.id}">
			                        <div class="p-3">
			                            <table class="table table-sm border">
			                                ${itemRows}
			                            </table>
			                            <div class="input-group input-group-sm mt-2" style="max-width: 400px;">
			                                <select class="form-select" id="menu-select-${person.id}">
			                                    <option selected disabled>Choose item...</option>
			                                    ${menuOptions}
			                                </select>
			                                <button class="btn btn-success" onclick="addItemToPerson(${person.id})">Add Item</button>
			                            </div>
			                        </div>
			                    </div>
			                </td>
			            </tr>`;
			    });

			    // Append the Grand Total Row at the end of the loop
			    output += `
			        <tr class="table-secondary align-middle">
			            <td class="ps-3 fw-bold">GRAND TOTAL</td>
			            <td class="text-success fw-bold font-monospace" colspan="2">$${grandTotal.toFixed(2)}</td>
			        </tr>`;

			    personBody.innerHTML = output;

			} catch (error) {
			    document.getElementById('data-output-person').innerHTML = `<tr><td colspan="3" class="text-center py-3 text-danger">People List Offline</td></tr>`;
			    console.log(error);
			}
        }

		async function fetchSchedule() {
		    try {
		        // 1. Re-fetch or use a global variable to get the current state of people
		        // For simplicity, let's fetch the latest list from the API before calculating
		        const personResponse = await fetch('http://localhost:8080/api/person');
		        const currentOrders = await personResponse.json();

		        // 2. POST the orders to your schedule endpoint
		        const response = await fetch('http://localhost:8080/api/schedule', {
		            method: 'POST',
		            headers: {
		                'Content-Type': 'application/json'
		            },
		            body: JSON.stringify(currentOrders) // Sending the list of Person objects
		        });

		        if (!response.ok) throw new Error('Calculation failed');

		        const scheduleData = await response.json();
				console.log(scheduleData);
		        const container = document.getElementById('schedule-container');
		        const body = document.getElementById('data-output-schedule');
				const alertPlaceholder = document.getElementById('alert-placeholder');
		        
		        // 3. Render the result (assuming rounds is the list returned)
		        body.innerHTML = scheduleData.rounds.map((round, i) => `
		            <tr>
		                <td>Round ${i + 1}</td>
		                <td class="fw-bold">${round.payerName}</td>
						<td class="text-success font-monospace">
						    ${round.balances.map(b => 
						        `${b.personName}: $${b.balance.toFixed(2)}`
						    ).join(' | ')}
						</td>
		            </tr>
		        `).join('');
		        
		        container.style.display = 'block';
		        container.scrollIntoView({ behavior: 'smooth' });
				
				if (scheduleData.maxNumOfRounds >= 90) {
				    alertPlaceholder.innerHTML = `
				        <div class="alert alert-warning alert-dismissible fade show" role="alert">
				            <strong>Warning:</strong>This schedule has been shortened to 90 rounds, the total amount of rounds: (${scheduleData.maxNumOfRounds}). Going longer than 3 months would Take to long
							Square up! 
				            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
				        </div>
				    `;
				} else {
				    alertPlaceholder.innerHTML = ''; // Clear it if it's a small schedule
				}

		    } catch (error) {
		        console.error(error);
		        alert("Failed to calculate schedule. Make sure people have items assigned.");
		    }
		}

		async function removeItem(personId, itemId) {
		    if (!confirm("Remove this item from the order?")) return;

		    try {
		        // 1. Fetch current people to find the target
		        const response = await fetch('http://localhost:8080/api/person');
		        const people = await response.json();
		        const person = people.find(p => p.id === personId);

		        if (!person) return;

		        // 2. Filter out the specific item by its ID
		        person.items = person.items.filter(item => item.id !== itemId);

		        // 3. Save the updated person back to the API
		        const saveResponse = await fetch('http://localhost:8080/api/person', {
		            method: 'POST',
		            headers: { 'Content-Type': 'application/json' },
		            body: JSON.stringify(person)
		        });

		        if (saveResponse.ok) {
		            fetchData(); // Refresh the UI tables
		        } else {
		            alert("Failed to remove item.");
		        }
		    } catch (error) {
		        console.error("Error removing item:", error);
		    }
		}

		async function submitPerson() {
		    const nameInput = document.getElementById('personNameInput');
		    const name = nameInput.value.trim();

		    if (!name) {
		        alert("Please enter a name");
		        return;
		    }

		    try {
		        const response = await fetch('http://localhost:8080/api/person', {
		            method: 'POST',
		            headers: { 'Content-Type': 'application/json' },
		            body: JSON.stringify({ name: name, items: [] })
		        });

		        if (response.ok) {
		            // Close modal using Bootstrap's instance
		            const modalElement = document.getElementById('addPersonModal');
		            const modal = bootstrap.Modal.getInstance(modalElement);
		            modal.hide();
		            
		            // Clear input and refresh list
		            nameInput.value = '';
		            fetchData(); 
		        } else {
		            throw new Error("Failed to save person");
		        }
		    } catch (error) {
		        console.error(error);
		        alert("Error adding person.");
		    }
		}
		
		async function removePerson(personId) {
		    if (!confirm("Are you sure you want to remove this person?")) return;

		    try {
		        const response = await fetch(`http://localhost:8080/api/person/${personId}`, {
		            method: 'DELETE'
		        });

		        if (response.ok) {
		            fetchData(); // Refresh the table list
		        } else {
		            throw new Error("Failed to delete person");
		        }
		    } catch (error) {
		        console.error(error);
		        alert("Error removing person.");
		    }
		}
		
		async function addItemToPerson(personId) {
		    const select = document.getElementById(`menu-select-${personId}`);
		    const itemId = parseInt(select.value); // The ID of the menu item to add

		    if (isNaN(itemId)) return;

		    try {
		        // 1. Fetch current people to find the one we're updating
		        const personResponse = await fetch('http://localhost:8080/api/person');
		        const people = await personResponse.json();
		        const person = people.find(p => p.id === personId);

		        // 2. Fetch the full item details from the menu to add to the person's list
		        const menuResponse = await fetch('http://localhost:8080/api/menu');
		        const menu = await menuResponse.json();
		        const newItem = menu.find(m => m.id === itemId);

		        if (!person || !newItem) return;

		        // 3. Update the local person object
		        person.items.push(newItem);

		        // 4. POST the entire updated person back to your endpoint
		        const response = await fetch('http://localhost:8080/api/person', {
		            method: 'POST',
		            headers: { 'Content-Type': 'application/json' },
		            body: JSON.stringify(person) // Backend handles save/update logic
		        });

		        if (response.ok) {
		            fetchData(); // Refresh the table UI
		        } else {
		            alert("Failed to update person.");
		        }
		    } catch (error) {
		        console.error("Error adding item:", error);
		    }
		}
		
		async function submitMenuItem() {
		    const name = document.getElementById('menuItemName').value;
		    const size = document.getElementById('menuItemSize').value;
		    const price = parseFloat(document.getElementById('menuItemPrice').value);

		    if (!name || isNaN(price)) {
		        alert("Please enter a valid name and price.");
		        return;
		    }

		    const newItem = { name, size, price };

		    try {
		        const response = await fetch('http://localhost:8080/api/menu', {
		            method: 'POST',
		            headers: { 'Content-Type': 'application/json' },
		            body: JSON.stringify(newItem)
		        });

		        if (response.ok) {
		            // Close modal and refresh the data
		            const modal = bootstrap.Modal.getInstance(document.getElementById('addMenuItemModal'));
		            modal.hide();
		            
		            // Clear inputs
		            document.getElementById('menuItemName').value = '';
		            document.getElementById('menuItemPrice').value = '';
		            
		            fetchData(); // Reload menu and people tables
		        } else {
		            alert("Failed to add menu item.");
		        }
		    } catch (error) {
		        console.error("Error adding menu item:", error);
		    }
		}


        fetchData();
    </script>
    <script src="/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
